name: mediassure
description: A medicine tracking and reminder app
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  firebase_core: ^3.3.0
  firebase_auth: ^5.1.4
  cloud_firestore: ^5.2.1
  firebase_storage: ^12.1.3
  image_picker: ^1.1.2
  flutter_local_notifications: ^17.2.2
  timezone: ^0.9.4
  cupertino_icons: ^1.0.8
  firebase_messaging: ^15.2.10
  fl_chart: ^1.2.0
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true